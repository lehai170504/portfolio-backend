spring:
  application:
    name: portfolio-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/portfolio_db
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: PortfolioPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
    open-in-view: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:hoanghaile175@gmail.com}
    password: ${MAIL_PASSWORD:lehoanghai170504}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  port: 8080
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
    expiration-ms: ${JWT_EXPIRATION:86400000}       # 24h
    refresh-expiration-ms: ${JWT_REFRESH:604800000}  # 7d

  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
      - ${FRONTEND_URL:https://yourportfolio.com}

  upload:
    dir: ${UPLOAD_DIR:./uploads}
    allowed-image-types: image/jpeg,image/png,image/webp
    allowed-doc-types: application/pdf
    max-image-size: 5242880   # 5MB
    max-doc-size: 10485760    # 10MB

  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:dlzlg8fty}
    api-key: ${CLOUDINARY_API_KEY:676549645229826}
    api-secret: ${CLOUDINARY_API_SECRET:TTX7PF5JczSZieph1jO_o7ICPLc}
    folder: ${CLOUDINARY_FOLDER:portfolio}

  contact:
    recipient-email: ${CONTACT_EMAIL:hoanghaile175@gmail.com}
  admin:
    email: ${ADMIN_EMAIL:admin@portfolio.com}
    password: ${ADMIN_PASSWORD:Admin@123}
    full-name: ${ADMIN_FULL_NAME:Portfolio Admin}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

logging:
  level:
    com.portfolio: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
